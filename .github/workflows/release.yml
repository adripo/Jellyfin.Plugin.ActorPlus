name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install JPRM
        run: pip install jprm

      - name: Get Version
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Extract version numbers only (e.g., v1.1.0 -> 1.1.0)
          VERSION_PARTS=$(echo "$TAG_NAME" | sed 's/^v//' | tr '.' ' ')
          # Normalize to 4 numbers using awk
          NORMALIZED_VER=$(echo $VERSION_PARTS | awk '{ printf "%d.%d.%d.%d", $1, $2, $3, $4 }')
          echo "VERSION=$NORMALIZED_VER" >> $GITHUB_OUTPUT
          echo "TAG=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Generate Changelog and Update Metadata
        run: |
          # Get the previous tag or the first commit if no previous tag exists
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${{ github.ref }}^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Generating changelog from $PREVIOUS_TAG to ${{ github.ref }}"
          
          # Generate changelog from commit history
          CHANGELOG=$(git log $PREVIOUS_TAG..${{ github.ref }} --oneline --pretty=format:"- [%h] %s")
          
          # Replace placeholder in jprm.yaml with multi-line changelog
          # Remove the existing changelog line
          sed -i '/changelog:/d' Jellyfin.Plugin.ActorPlus/jprm.yaml
          # Append the multi-line block
          echo "changelog: |" >> Jellyfin.Plugin.ActorPlus/jprm.yaml
          echo "$CHANGELOG" | sed 's/^/  /' >> Jellyfin.Plugin.ActorPlus/jprm.yaml
          
          echo "Updated jprm.yaml with changelog:"
          cat Jellyfin.Plugin.ActorPlus/jprm.yaml

      - name: Build and Package
        run: |
          # Use jprm to build the plugin. 
          mkdir -p ./artifacts
          jprm plugin build Jellyfin.Plugin.ActorPlus --version ${{ steps.get_version.outputs.VERSION }} --output ./artifacts

      - name: Update Repository Manifest
        run: |
          # JPRM repo add updates the manifest.json using metadata from jprm.yaml and the zip artifact
          # We use '.' as the repository path so it finds manifest.json in the current directory.
          REPO_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.TAG }}/ActorPlus_${{ steps.get_version.outputs.VERSION }}.zip"
          jprm repo add . artifacts/*.zip -u "$REPO_URL" -U "$REPO_URL"

      - name: Commit Manifest
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add manifest.json
          git commit -m "chore: release ${{ steps.get_version.outputs.VERSION }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          tag_name: ${{ steps.get_version.outputs.TAG }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
