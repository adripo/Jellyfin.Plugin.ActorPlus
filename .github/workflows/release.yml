name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Get Version
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Extract version numbers only (e.g., v1.1.0 -> 1.1.0)
          VERSION_PARTS=$(echo "$TAG_NAME" | sed 's/^v//' | tr '.' ' ')
          # Normalize to 4 numbers using awk
          NORMALIZED_VER=$(echo $VERSION_PARTS | awk '{ printf "%d.%d.%d.%d", $1, $2, $3, $4 }')
          echo "VERSION=$NORMALIZED_VER" >> $GITHUB_OUTPUT
          echo "TAG=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build Jellyfin.Plugin.ActorPlus/Jellyfin.Plugin.ActorPlus.csproj -c Release /p:Version=${{ steps.get_version.outputs.VERSION }}

      - name: Package
        run: |
          mkdir -p ./publish
          cp Jellyfin.Plugin.ActorPlus/bin/Release/net9.0/Jellyfin.Plugin.ActorPlus.dll ./publish/
          cd publish
          zip -r ../ActorPlus_${{ steps.get_version.outputs.VERSION }}.zip .
          cd ..

      - name: Calculate Checksum
        id: checksum
        run: echo "MD5=$(md5sum ActorPlus_${{ steps.get_version.outputs.VERSION }}.zip | awk '{ print $1 }')" >> $GITHUB_OUTPUT

      - name: Update Manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifestPath = './manifest.json';
            let manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            const version = '${{ steps.get_version.outputs.VERSION }}';
            const tag = '${{ steps.get_version.outputs.TAG }}';
            const checksum = '${{ steps.checksum.outputs.MD5 }}';
            const repo = context.repo.owner + '/' + context.repo.repo;
            
            const newVersion = {
              version: version,
              changelog: `Release ${version}`,
              targetAbi: '10.11.0.0',
              sourceUrl: `https://github.com/${repo}/releases/download/${tag}/ActorPlus_${version}.zip`,
              checksum: checksum,
              timestamp: new Date().toISOString()
            };

            // Update or add version
            if (!manifest[0].versions) manifest[0].versions = [];
            manifest[0].versions.unshift(newVersion);
            
            fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 4));

      - name: Commit Manifest
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add manifest.json
          git commit -m "chore: release ${{ steps.get_version.outputs.VERSION }} [skip ci]"
          git push origin main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ActorPlus_${{ steps.get_version.outputs.VERSION }}.zip
          tag_name: ${{ steps.get_version.outputs.TAG }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
